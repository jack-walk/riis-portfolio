  bio: |
    Jack Walker is a journalist based in Brooklyn who covers topics including health, labor, social services and the LGBTQ+ community.

    Jack specializes in data journalism, but also dabbles in audio and written storytelling. He is pursuing an M.A. at the Craig Newmark School of Journalism, and also holds an M.A. and B.A. from Brown University.

    Jack's reporting has been featured in news outlets like The Advocate, West Virginia Public Broadcasting, Pittsburgh's Public Source.

clips:
  - slug: xmas
    title: Christmas tree disposal requests spiked last holiday
    image: /photos/xmas.jpeg
    imageAlt: A Christmas tree sits curbside
    imageCredit: Jack Walker
    description: Tracking Christmas tree disposal issues in Washington, D.C.
    url: https://jack-walk.github.io/dc-xmas-trees/
    skills:
      - Data visualization
      - Data analysis
      - Coding
      - Local reporting
    body: |
      As the holidays end, many D.C. residents will place their Christmas trees curbside for disposal by the Department of Public Works. But complaints over missed pickups doubled in 2025, suggesting there were hiccups in the service.

      In the new year, the department will collect trees placed outside “single-family homes and apartment dwellings” from Jan. 2 to Feb. 28, according to the department website. Households that are skipped over can file service requests through the city’s 311 hotline, or independently deliver their trees to a disposal location.

      However, the city's curbside removal system has recently faced difficulties. Last holiday season, D.C. recorded the most service requests due to missed pickups since 2020, according to public 311 records. Tree disposal requests surpassed 2,700, more than doubling those filed one year prior.

  - slug: officiants
    title: How $25 and 24 Hours Can Make a Wedding Official
    image: /photos/forms.jpg
    imageAlt: One-day marriage officiant forms sit atop a table
    imageCredit: Jack Walker/NYCity News Service
    description: Examining the rise of one-day marriage officiants in New York City.
    url: https://howweloveinnyc.nycitynewsservice.com/how-25-and-24-hours-can-make-a-wedding-official/
    skills:
      - Data analysis
      - Photography
      - Local reporting
    body: |
      Caitlyn Johnson was a natural choice for the ceremony. In college, she and the bride found unlikely camaraderie over a shared crush. Since then, Johnson had stood by through good dates, bad dates, and the unexpected Bumble match that led her friend down the aisle.

      But on the wedding day, Johnson wasn’t altarside as a bridesmaid. In a lush Westchester backyard, she stood beneath the arch and braced herself for a less orthodox role: the wedding officiant. Weeks earlier, she had applied for a single-use license to perform the ceremony.

      “If that process didn’t exist, I don’t think she would have asked me,” said Johnson, a Long Island City resident who works in tech sales. “To be part of someone’s wedding is really special.”

      About one-third of the city’s weddings are now performed by one-day officiants like Johnson, according to City Clerk Michael McSweeney. That’s because of a simplified licensing process the state launched in 2023.

  - slug: die
    title: ACT UP hosts die-in over Palantir-Trump contracts
    image: /photos/die.png
    imageAlt: A person adorning religious clothing and makeup lies on the pavement, as if dead.
    imageCredit: Jack Walker/The Advocate
    description: Reporting live from a New York City march and protest.
    url: https://www.advocate.com/politics/advocacy/act-up-palantir-nyc-protest
    skills:
      - Breaking news
      - Local reporting
      - LGBTQ+ reporting
      - Photography
    body: |
      In the middle of a busy New York City street, dozens of people lay still atop the pavement on Saturday afternoon. ACT UP, one of the world’s most prominent HIV advocacy groups, organized the demonstration outside Palantir, a software company that develops surveillance technology and contracts with Immigration and Customs Enforcement.

      The demonstration was a callback to die-ins staged by AIDS advocacy groups from the 1980s onward to celebrate the organization’s 39th anniversary. Hundreds of protesters rallied at the New York City AIDS Memorial, then marched to Palantir’s unmarked office in Manhattan’s Flatiron District, protesting government spending on ICE and the war against Iran amid cuts to funding for HIV care.